name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Ruff
        run: uv run ruff check .

      - name: Types (ty)
        run: uv run ty check

      - name: Tests
        run: uv run pytest
